<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalogue Approval Workspace</title>
  <style>
    :root { --bg:#efefef; --line:#d9d9d9; --text:#222; }
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .app{max-width:1400px;margin:0 auto;padding:18px}
    .top{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid #cfcfcf;padding-bottom:10px;margin-bottom:14px}
    .kicker{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#666}
    h1{margin:4px 0 0;font-size:30px;font-weight:600}
    .panel{background:#fff;border:1px solid var(--line)}
    .filters{display:grid;gap:8px;padding:10px;border-bottom:1px solid #e2e2e2;grid-template-columns:1fr 180px 180px 180px 220px}
    input,select,button{height:44px;border:1px solid #aaa;padding:0 12px;font-size:14px;background:#fff}
    .primary{background:#000;color:#fff;border-color:#000;font-weight:700}
    table{width:100%;border-collapse:collapse;font-size:14px}.th{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#666;background:#f8f8f8}
    th,td{padding:12px;border-bottom:1px solid #e5e5e5;text-align:left}
    .open{height:auto;padding:7px 12px;font-size:12px}
    .detail{display:none}
    .crumb{font-size:12px;margin:0 0 10px;color:#444}
    .detail-grid{display:grid;grid-template-columns:72px 1fr 390px;background:#fff}
    .rail{background:#f2f2f2;border-right:1px solid #d9d9d9;padding:8px}.thumb{width:100%;aspect-ratio:3/4;border:1px solid #cfcfcf;object-fit:cover;display:block;margin-bottom:10px}
    .stage{position:relative;background:#f1f1f1;padding:10px}.hero{display:block;width:100%;max-width:760px;aspect-ratio:4/5;object-fit:cover;background:#ececec;margin:0 auto}
    .arrow{position:absolute;top:50%;transform:translateY(-50%);font-size:58px;border:none;background:transparent;cursor:pointer;color:#666}
    .arrow.l{left:10px}.arrow.r{right:10px}
    .side{border-left:1px solid #d9d9d9;padding:18px}.back{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:#777;cursor:pointer}
    .title{font-size:42px;line-height:1.1;margin:10px 0}.price{font-size:40px;margin:8px 0}
    .sw{display:flex;gap:8px}.sw img{width:48px;height:64px;object-fit:cover;border:1px solid #aaa}
    .row2{display:grid;grid-template-columns:1fr 56px;gap:8px}.wish{border-radius:999px;font-size:24px}
    .meta{border:1px solid #e2e2e2;padding:12px;margin-top:14px;font-size:14px}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    @media (max-width:1100px){.filters{grid-template-columns:1fr 1fr}.detail-grid{grid-template-columns:1fr}.rail{display:none}.side{border-left:none;border-top:1px solid #d9d9d9}}
  </style>
</head>
<body>
<div class="app">
  <header class="top"><div><div class="kicker">Supplier ingestion queue</div><h1>Catalogue Approval Workspace</h1></div><div id="counter">1 of 24 pending review</div></header>

  <section id="list" class="panel">
    <div class="filters"><input placeholder="Search SKU, name, supplier or brand"><select><option>Status: All</option></select><select><option>Supplier: All</option></select><select><option>Type: All</option></select><button class="primary">Approve selected (2)</button></div>
    <table><thead class="th"><tr><th><input type="checkbox" checked></th><th>Item</th><th>SKU</th><th>Supplier</th><th>Colour</th><th>Sizes</th><th>Status</th><th></th></tr></thead><tbody id="rows"></tbody></table>
  </section>

  <section id="detail" class="detail">
    <div class="crumb">Home › Men › CTAS › Festival › <span id="crumbName"></span></div>
    <div class="detail-grid panel">
      <aside class="rail" id="rail"></aside>
      <div class="stage"><img id="hero" class="hero" alt="product"><button class="arrow l" onclick="nav(-1)">‹</button><button class="arrow r" onclick="nav(1)">›</button></div>
      <article class="side"><div class="back" onclick="showList()">← back to list</div><h2 id="title" class="title"></h2><div id="price" class="price"></div><div id="cost"></div>
        <p><b>COLOUR:</b> <span id="colour"></span></p><div class="sw" id="sw"></div>
        <p style="margin-top:14px"><b>SIZE:</b></p><select id="sizes" style="width:100%"></select>
        <div class="row2" style="margin-top:10px"><button class="primary">APPROVE ITEM</button><button class="wish">♡</button></div>
        <div class="meta" id="meta"></div><div class="two"><button>Reject</button><button>Need Changes</button></div><div class="two"><button onclick="nav(-1)">← Previous item</button><button onclick="nav(1)">Next item →</button></div>
      </article>
    </div>
  </section>
</div>
<script>
const items=[{sku:'BLZ-981237-BLK-01',name:'Oversized Structured Blazer',brand:'Design Studio',supplier:'North Lane Apparel Ltd',colour:'Jet Black',sizes:['UK 6','UK 8','UK 10','UK 12','UK 14'],status:'Pending',rrp:'$145.00',cost:'$74.00',margin:'48.97%',image:'https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=1200&q=80',thumbs:['https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=400&q=80','https://images.unsplash.com/photo-1445205170230-053b83016050?auto=format&fit=crop&w=400&q=80']},{sku:'SRT-771004-GRY-02',name:'French Terry Oversized Shorts',brand:'Athletic Supply',supplier:'Peak Sport Wholesale',colour:'Grey',sizes:['XS','S','M','L','XL'],status:'Needs changes',rrp:'$49.99',cost:'$21.10',margin:'57.79%',image:'https://images.unsplash.com/photo-1617952385804-7efee95f5ee4?auto=format&fit=crop&w=1200&q=80',thumbs:['https://images.unsplash.com/photo-1617952385804-7efee95f5ee4?auto=format&fit=crop&w=400&q=80','https://images.unsplash.com/photo-1622470953794-aa9c70b0fb9d?auto=format&fit=crop&w=400&q=80']}];
let i=0;
function renderList(){rows.innerHTML=items.map((x,n)=>`<tr><td><input type='checkbox' ${n===0?'checked':''}></td><td><b>${x.name}</b><div style='font-size:12px;color:#666'>${x.brand}</div></td><td>${x.sku}</td><td>${x.supplier}</td><td>${x.colour}</td><td>${x.sizes.join(', ')}</td><td>${x.status}</td><td><button class='open' onclick='openDetail(${n})'>Open</button></td></tr>`).join('')}
function openDetail(n){i=n; renderDetail(); list.style.display='none'; detail.style.display='block'}
function showList(){detail.style.display='none';list.style.display='block'}
function nav(d){i=(i+d+items.length)%items.length;renderDetail()}
function renderDetail(){const x=items[i];crumbName.textContent=x.name;hero.src=x.image;title.textContent=`${x.brand} ${x.name}`;price.textContent=x.rrp;cost.textContent=`Cost ${x.cost} · Margin ${x.margin}`;colour.textContent=x.colour;sizes.innerHTML=`<option>Please select</option>`+x.sizes.map(s=>`<option>${s}</option>`).join('');sw.innerHTML=x.thumbs.map(t=>`<img src='${t}'>`).join('');rail.innerHTML=x.thumbs.map(t=>`<img class='thumb' src='${t}'>`).join('');meta.innerHTML=`Submitted by ${x.supplier}<br>SKU: ${x.sku}`;counter.textContent=`${i+1} of 24 pending review`}
renderList(); renderDetail();
</script>
</body>
</html>
